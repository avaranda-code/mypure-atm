/* ── Chat Screen ── */
function renderChat(flowKey, brand, onClose, onBack) {
  const chat = getChat(flowKey);
  const flow = getFlowConfig(flowKey);
  const wrap = el('div', { class: 'chat-screen', 'data-brand': brand.id });

  wrap.appendChild(StatusBarDark());
  wrap.appendChild(el('div', { class: 'browser-bar' },
    el('button', { class: 'browser-bar-btn', html: ICONS.browserClose, onclick: onClose }),
    el('div', { class: 'browser-bar-center' },
      el('div', { class: 'browser-bar-domain' },
        el('span', { html: ICONS.lock }),
        el('span', {}, brand.domain),
      ),
      el('div', { class: 'browser-bar-source' }, 'Instagram'),
    ),
    el('button', { class: 'browser-bar-btn', html: ICONS.browserMore }),
  ));
  wrap.appendChild(el('div', { class: 'chat-header' },
    // Back button navigates to whatever the caller passed (e.g. Flow A
    // returns to the PDP). Falls back to closing the chat if no handler.
    el('button', {
      class: 'chat-circle-btn',
      html: ICONS.back,
      onclick: onBack || onClose,
    }),
    el('div', { class: 'chat-header-right' },
      el('button', { class: 'chat-circle-btn', html: ICONS.cartHeader }),
      el('button', { class: 'chat-track-pill' }, 'Track orders'),
      el('button', { class: 'chat-circle-btn', html: ICONS.closeX, onclick: onClose }),
    ),
  ));
  // Body
  const body = el('div', { class: 'chat-body' });

  // AI disclaimer — sits inside the scroll body so it scrolls away with messages
  body.appendChild(el('div', { class: 'ai-disclosure' },
    'This chat is powered by AI assistance.',
  ));

  // Product card at top (always shown) — clicking opens PDP
  const productLabel = (flow.productLabel || brand.product.shortName || brand.product.name.replace(/\n/g, ' '));
  body.appendChild(el('div', { class: 'in-chat-product' },
    el('button', {
      class: 'in-chat-product-btn',
      onclick: () => {
        if (flowKey === 'flowA') {
          state.flowAReturnTo = 'chat';
          state.flowA = 'pdp';
        } else if (flowKey === 'discovery1') {
          state.discovery1ReturnTo = 'chat-full';
          state.discovery1 = 'pdp';
        } else {
          state.flowC1ReturnTo = 'chat';
          state.flowC1 = 'pdp';
        }
        render();
      },
    },
      el('span', { class: 'in-chat-product-img', style: 'background-image: url(' + JSON.stringify(brand.product.images[0]) + ')' }),
      el('span', { class: 'in-chat-product-name' }, productLabel),
    ),
  ));

  // PDP-origin user messages first (with arrow)
  chat.messages.filter(m => m.role === 'user' && m.fromPdp).forEach(m => {
    body.appendChild(el('div', { class: 'chat-pdp-question' },
      el('span', {},
        el('span', { class: 'arrow' }, '↳ '),
        m.text,
      ),
    ));
  });

  // Other messages in order
  chat.messages.forEach(m => {
    if (m.role === 'user' && m.fromPdp) return;
    if (m.role === 'ai') {
      const aiEl = el('div', { class: 'chat-msg-ai' });
      body.appendChild(aiEl);
      if (m.typewriter === 'pending') {
        // Start the reveal animation. Mark as 'running' so subsequent
        // re-renders don't restart the typewriter on a stale element.
        m.typewriter = 'running';
        startMessageTypewriter(aiEl, m.text, () => {
          m.typewriter = 'done';
          chat.typewriterPending = false;
          render();
        });
      } else {
        aiEl.textContent = m.text;
      }
    } else if (m.role === 'user') {
      body.appendChild(el('div', { class: 'chat-msg-user' },
        el('div', { class: 'chat-msg-user-bubble' }, m.text),
      ));
    } else if (m.role === 'rec') {
      // Hold the rec card back until the typewriter has finished —
      // otherwise it pops in while the AI is still typing.
      if (!chat.typewriterPending) {
        body.appendChild(renderRecCard(flowKey, brand));
      }
    }
  });

  // Typing indicator
  if (chat.isTyping) body.appendChild(renderTypingDots());

  // Active chips — also held back until any typewriter completes
  if (!chat.isTyping && chat.phase === 'asking' && !chat.skippedToFree && !chat.typewriterPending) {
    const turn = flow.turns[chat.turnIdx];
    if (turn && turn.options) {
      const replies = el('div', { class: 'chat-replies' });
      turn.options.forEach(opt => {
        replies.appendChild(el('button', {
          class: 'chat-reply',
          onclick: () => handleChipClick(flowKey, opt.label),
        }, opt.label));
      });
      body.appendChild(replies);
    }
  }
  // Free-text follow-up chips
  if (!chat.isTyping && chat.freeFollowUps && chat.freeFollowUps.length && !chat.typewriterPending) {
    const replies = el('div', { class: 'chat-replies' });
    chat.freeFollowUps.forEach(chip => {
      replies.appendChild(el('button', {
        class: 'chat-reply',
        onclick: () => handleFollowUpFreeChip(flowKey, chip),
      }, chip));
    });
    body.appendChild(replies);
  }

  wrap.appendChild(body);

  // Auto-scroll to bottom
  setTimeout(() => { body.scrollTop = body.scrollHeight; }, 0);

  // Reply input
  const inputBar = el('div', { class: 'chat-reply-input' });
  const pill = el('div', { class: 'chat-reply-input-pill' });
  const input = el('input', {
    type: 'text',
    placeholder: chat.isTyping ? 'One sec…' : 'Type a question or reply…',
    'data-input': flowKey,
  });
  input.value = chat.inputDraft;
  input.addEventListener('input', (e) => {
    setDraft(flowKey, e.target.value);
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      handleSendDraft(flowKey);
    }
  });
  pill.appendChild(input);

  const isActive = chat.inputDraft.trim().length > 0;
  const sendBtn = el('button', {
    class: 'send-btn ' + (isActive ? 'active' : 'inactive'),
    'data-send': flowKey,
    html: ICONS.sendUp,
    onclick: () => handleSendDraft(flowKey),
  });
  pill.appendChild(sendBtn);
  inputBar.appendChild(pill);
  wrap.appendChild(inputBar);

  wrap.appendChild(el('div', { class: 'browser-toolbar' },
    el('button', { class: 'browser-toolbar-btn disabled', html: ICONS.bbBack }),
    el('button', { class: 'browser-toolbar-btn disabled', html: ICONS.bbFwd }),
    el('button', { class: 'browser-toolbar-btn', html: ICONS.bbShare }),
    el('button', { class: 'browser-toolbar-btn', html: ICONS.bbReload }),
    el('button', { class: 'browser-toolbar-btn', html: ICONS.bbHistory }),
  ));

  return wrap;
}

/* ── Flow 0: real product page rendered as a scrollable screenshot ──
   Most Shopify-hosted sites (including bigboldhealth.com) block iframe
   embedding via X-Frame-Options / CSP frame-ancestors. Instead, we use
   image.thum.io — a free screenshot-as-a-service that captures the full
   mobile-rendered page as a single tall PNG. We then make it scrollable
   inside the phone frame so it looks/feels like browsing the real site. */
function renderBrandProductPage(brand, onClose) {
  const wrap = el('div', { class: 'product-page-screen' });
  wrap.appendChild(StatusBarDark());

  wrap.appendChild(el('div', { class: 'browser-bar' },
    el('button', { class: 'browser-bar-btn', html: ICONS.browserClose, onclick: onClose }),
    el('div', { class: 'browser-bar-center' },
      el('div', { class: 'browser-bar-domain' },
        el('span', { html: ICONS.lock }),
        el('span', {}, brand.domain),
      ),
      el('div', { class: 'browser-bar-source' }, 'Instagram'),
    ),
    el('button', { class: 'browser-bar-btn', html: ICONS.browserMore }),
  ));

  const url = brand.productPageUrl || ('https://' + brand.domain);
  // Prefer a hand-saved screenshot if the brand has one — gives us a clean,
  // pixel-perfect image and avoids any screenshot-service rate-limiting.
  // Accepts a data URI / full URL (used as-is) or a local filename. Falls
  // back to thum.io if no screenshot is provided.
  const screenshotUrl = brand.screenshotImage
    ? (/^(data:|https?:)/.test(brand.screenshotImage) ? brand.screenshotImage : './' + brand.screenshotImage)
    : 'https://image.thum.io/get/fullpage/viewportWidth/420/width/750/maxAge/24/' + url;

  const scroll = el('div', { class: 'product-page-scroll' });

  const loading = el('div', { class: 'product-page-loading' },
    el('div', { class: 'product-page-spinner' }),
    'Loading ' + brand.domain + '…',
  );
  scroll.appendChild(loading);

  const img = el('img', {
    class: 'product-page-screenshot',
    src: screenshotUrl,
    alt: brand.name + ' product page',
  });
  img.addEventListener('load', () => {
    img.classList.add('loaded');
    loading.remove();
  });
  img.addEventListener('error', () => {
    loading.replaceWith(el('div', { class: 'product-page-fallback' },
      el('p', {}, "Couldn't generate a screenshot of " + brand.domain + "."),
      el('p', {}, "Tap below to open the real product page in a new tab."),
      el('a', { href: url, target: '_blank', rel: 'noreferrer' }, 'Open product page →'),
    ));
  });
  scroll.appendChild(img);

  wrap.appendChild(scroll);

  wrap.appendChild(el('div', { class: 'browser-toolbar' },
    el('button', { class: 'browser-toolbar-btn disabled', html: ICONS.bbBack }),
    el('button', { class: 'browser-toolbar-btn disabled', html: ICONS.bbFwd }),
    el('button', { class: 'browser-toolbar-btn', html: ICONS.bbShare }),
    el('button', { class: 'browser-toolbar-btn', html: ICONS.bbReload, onclick: () => {
      // bust cache and reload
      img.src = screenshotUrl + (screenshotUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
      img.classList.remove('loaded');
    } }),
    el('button', { class: 'browser-toolbar-btn', html: ICONS.bbHistory }),
  ));

  return wrap;
}

/* ── Discovery 1.0: half-sheet chat (sits over the IG ad) ──
   Behavior: tapping any chip OR focusing the input expands the sheet
   to a full-screen chat (state.discovery1 = 'chat-full'). */
function renderHalfSheetChat(brand, onClose) {
  const flowKey = 'discovery1';
  const flow = getFlowConfig(flowKey);
  const chat = getChat(flowKey);

  const expandToFull = () => {
    state.discovery1 = 'chat-full';
    render();
  };

  const sheet = el('div', { class: 'discovery-half-sheet', 'data-brand': brand.id });

  // Slide the sheet down, then hand off to onClose.
  const dismiss = () => {
    sheet.style.transition = 'transform 0.25s ease';
    sheet.style.transform = 'translateY(100%)';
    setTimeout(onClose, 220);
  };

  // Top bar: just the drag handle. Tapping the bar dismisses the sheet;
  // dragging it down past a threshold dismisses too (snaps back otherwise).
  // The SPQ chips and input below are untouched — they expand to full chat.
  const head = el('div', { class: 'discovery-half-head' },
    el('div', { class: 'discovery-half-handle' }),
  );

  let startY = 0, curY = 0, dragging = false, moved = false;
  const onMove = (e) => {
    if (!dragging) return;
    const dy = e.clientY - startY;
    curY = Math.max(0, dy);
    if (Math.abs(dy) > 6) moved = true;
    sheet.style.transform = 'translateY(' + curY + 'px)';
  };
  const onUp = () => {
    if (!dragging) return;
    dragging = false;
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    if (curY > sheet.getBoundingClientRect().height * 0.28) {
      dismiss();
    } else {
      sheet.style.transition = 'transform 0.25s ease';
      sheet.style.transform = 'translateY(0)';
    }
    curY = 0;
  };
  head.addEventListener('pointerdown', (e) => {
    dragging = true; moved = false; curY = 0;
    startY = e.clientY;
    sheet.style.transition = 'none';
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });
  // A tap on the bar (no real drag) dismisses too.
  head.addEventListener('click', () => { if (!moved) dismiss(); });

  sheet.appendChild(head);

  // AI disclaimer (concise, same as full chat)
  sheet.appendChild(el('div', { class: 'ai-disclosure' },
    'This chat is powered by AI assistance.',
  ));

  // Body
  const body = el('div', { class: 'chat-body' });

  // First turn prompt (no greeting — the bot leads straight into the question)
  const t0 = flow.turns[0];
  body.appendChild(el('div', { class: 'chat-msg-ai' }, t0.prompt));

  // Quick-reply chips — click expands AND advances the chat
  const replies = el('div', { class: 'chat-replies' });
  t0.options.forEach(opt => {
    replies.appendChild(el('button', {
      class: 'chat-reply',
      onclick: () => {
        // Switch to full mode first, then process the chip in the now-full chat
        state.discovery1 = 'chat-full';
        // Make sure the chat is initialized so handleChipClick has something to advance
        if (chat.messages.length === 0) openChat(flowKey);
        handleChipClick(flowKey, opt.label);
      },
    }, opt.label));
  });
  body.appendChild(replies);

  sheet.appendChild(body);

  // Reply input — focusing or typing expands to full
  const inputBar = el('div', { class: 'chat-reply-input' });
  const pill = el('div', { class: 'chat-reply-input-pill' });
  const input = el('input', {
    type: 'text',
    placeholder: 'Type a question or reply…',
    onfocus: expandToFull,
    onmousedown: expandToFull,
  });
  pill.appendChild(input);
  pill.appendChild(el('button', { class: 'send-btn inactive', html: ICONS.sendUp, onclick: expandToFull }));
  inputBar.appendChild(pill);
  sheet.appendChild(inputBar);

  return sheet;
}

/* ── Phone ── */
function renderPhone(flowKey) {
  const brand = getBrand();
  const phone = el('div', { class: 'phone' });
  phone.appendChild(el('div', { class: 'phone-side-l1' }));
  phone.appendChild(el('div', { class: 'phone-side-l2' }));
  phone.appendChild(el('div', { class: 'phone-side-l3' }));
  phone.appendChild(el('div', { class: 'phone-side-r1' }));

  const screen = el('div', { class: 'phone-screen' });

  if (flowKey === 'flow0') {
    // Flow 0 (BBH only) — IG ad → real product page on the brand's website
    if (state.flow0 === 'ad') {
      screen.appendChild(renderInstagramFeed(brand, () => {
        state.flow0 = 'page';
        render();
      }));
    } else {
      screen.appendChild(renderBrandProductPage(brand,
        () => { state.flow0 = 'ad'; render(); }
      ));
    }
  } else if (flowKey === 'flowA') {
    if (state.flowA === 'ad') {
      screen.appendChild(renderInstagramFeed(brand, () => {
        // Tapping CTA: real Kollo PDP loads behind, then our PDP slides up
        // on top of it during the slideUp animation.
        state.flowAFromAd = true;
        state.flowAReturnTo = 'listing';
        state.flowA = 'pdp';
        render();
      }));
    } else if (state.flowA === 'listing') {
      screen.appendChild(renderListingPage('flowA', brand,
        () => { state.flowA = 'ad'; render(); }
      ));
    } else if (state.flowA === 'pdp') {
      // Background depends on origin:
      // - from chat (in-chat product card) → chat behind
      // - from IG ad → real brand PDP screenshot behind (the brief "loading
      //   the real site" flash that's revealed during the slide-up)
      // - from listing card → listing behind
      if (state.flowAReturnTo === 'chat') {
        screen.appendChild(renderChat('flowA', brand, () => {}));
      } else if (state.flowAFromAd) {
        screen.appendChild(renderBrandProductPage(brand, () => {}));
      } else {
        screen.appendChild(renderListingPage('flowA', brand, () => {}));
      }
      screen.appendChild(renderPdp(brand,
        () => {
          // Close PDP → reveal whatever's behind (listing / chat)
          state.flowA = state.flowAReturnTo || 'listing';
          state.flowAFromAd = false;
          render();
        },
        (chipText) => {
          state.flowAClickedChip = chipText;
          state.flowA = 'chat';
          state.flowAReturnTo = 'listing';
          state.flowAFromAd = false;
          // Brands using the minimal PDP get a "thinking" beat — the AI
          // welcome lands after the typing animation runs.
          openChat('flowA', { starter: chipText, delayedWelcome: brand.pdpVariant === 'minimal' });
          render();
        }
      ));
    } else if (state.flowA === 'chat') {
      if (state.chatA.messages.length === 0) {
        const chip = state.flowAClickedChip || getBrand().flowA.starterChip;
        state.flowAClickedChip = chip;
        openChat('flowA', { starter: chip, delayedWelcome: brand.pdpVariant === 'minimal' });
      }
      screen.appendChild(renderChat('flowA', brand,
        // onClose — exit chat lands on the brand's collection / listing page
        () => { state.flowA = 'listing'; state.flowAClickedChip = null; state.chatA = freshChatState(); render(); },
        // onBack — return to the PDP that spawned the chat
        () => { state.flowAReturnTo = 'listing'; state.flowA = 'pdp'; render(); }
      ));
    }
  } else if (flowKey === 'flowC1') {
    if (state.flowC1 === 'ad') {
      screen.appendChild(renderInstagramFeed(brand, () => {
        // Tapping CTA: briefly show the real Kollo PDP (~700ms), then the
        // chat takes over. Mirrors the Flow A "real site flashes behind our
        // overlay" feeling, since the chat has no slide-up animation.
        state.flowC1 = 'loading';
        render();
        setTimeout(() => {
          if (state.flowC1 !== 'loading') return; // user navigated away
          state.flowC1 = 'chat';
          openChat('flowC1');
          render();
        }, 700);
      }));
    } else if (state.flowC1 === 'loading') {
      // Real Kollo PDP screenshot, no interactive controls.
      screen.appendChild(renderBrandProductPage(brand, () => {}));
    } else if (state.flowC1 === 'listing') {
      // Brand collection page — exit drops back to the IG ad
      screen.appendChild(renderListingPage('flowC1', brand,
        () => { state.flowC1 = 'ad'; render(); }
      ));
    } else if (state.flowC1 === 'pdp') {
      // PDP background depends on where the user came from
      if (state.flowC1ReturnTo === 'listing') {
        screen.appendChild(renderListingPage('flowC1', brand, () => {}));
      } else {
        if (state.chatC1.messages.length === 0) openChat('flowC1');
        screen.appendChild(renderChat('flowC1', brand, () => {}));
      }
      screen.appendChild(renderPdp(brand,
        () => {
          state.flowC1 = state.flowC1ReturnTo || 'chat';
          render();
        },
        (chipText) => {
          state.flowC1 = 'chat';
          render();
        }
      ));
    } else {
      // chat
      if (state.chatC1.messages.length === 0) openChat('flowC1');
      screen.appendChild(renderChat('flowC1', brand,
        // onClose — exit chat lands on the brand's collection page
        () => { state.flowC1 = 'listing'; state.chatC1 = freshChatState(); render(); }
      ));
    }
  } else if (flowKey === 'discovery1') {
    // Discovery 1.0 — PDP loads first, half-sheet pops up over it → full chat
    if (state.discovery1 === 'ad') {
      screen.appendChild(renderInstagramFeed(brand, () => {
        // Tapping CTA: load the PDP first, then pop the half-sheet after a beat
        state.discovery1 = 'pdp-intro';
        render();
        setTimeout(() => {
          if (state.discovery1 === 'pdp-intro') {
            state.discovery1 = 'chat-half';
            openChat('discovery1');
            render();
          }
        }, 1100);
      }));
    } else if (state.discovery1 === 'listing') {
      // Brand collection page — exit drops back to the IG ad
      screen.appendChild(renderListingPage('discovery1', brand,
        () => { state.discovery1 = 'ad'; render(); }
      ));
    } else if (state.discovery1 === 'pdp-intro') {
      // Sachin & Babi's real product page (mobile screenshot) loads behind; the
      // half-sheet follows via the timeout above.
      screen.appendChild(renderBrandProductPage(brand,
        () => { state.discovery1 = 'ad'; render(); }
      ));
    } else if (state.discovery1 === 'pdp-rest') {
      // Half-sheet dismissed — Sachin & Babi's real product page remains, scrollable
      screen.appendChild(renderBrandProductPage(brand,
        () => { state.discovery1 = 'listing'; render(); }
      ));
    } else if (state.discovery1 === 'chat-half') {
      // Sachin & Babi's real product page behind, half-sheet chat overlay on top
      screen.appendChild(renderBrandProductPage(brand,
        // Browser close → leave the product entirely
        () => { state.discovery1 = 'listing'; state.chatDiscovery1 = freshChatState(); render(); }
      ));
      screen.appendChild(renderHalfSheetChat(brand,
        // Tapping/dragging the top bar collapses the sheet, revealing the page
        () => { state.discovery1 = 'pdp-rest'; state.chatDiscovery1 = freshChatState(); render(); }
      ));
    } else if (state.discovery1 === 'chat-full') {
      if (state.chatDiscovery1.messages.length === 0) {
        // If the user typed/tapped a question on the PDP, answer it directly
        // (routes through the free-text bank); otherwise open with the prompt.
        const starter = state.discovery1ClickedChip;
        openChat('discovery1', starter ? { starter, delayedWelcome: true } : {});
        state.discovery1ClickedChip = null;
      }
      screen.appendChild(renderChat('discovery1', brand,
        // onClose (X) — once the user is engaging in the chat, the X takes
        // them back to the product page (not the collection page).
        () => {
          state.discovery1 = 'pdp-rest';
          state.chatDiscovery1 = freshChatState();
          render();
        }
      ));
    } else if (state.discovery1 === 'pdp') {
      // PDP as screen takeover. Background depends on where we came from:
      // - from the half-sheet (product card tap) → IG ad behind
      // - from listing card → listing behind
      // - from full chat (rec card / in-chat product card) → chat behind
      if (state.discovery1ReturnTo === 'chat-half') {
        screen.appendChild(renderInstagramFeed(brand, () => {}));
      } else if (state.discovery1ReturnTo === 'listing') {
        screen.appendChild(renderListingPage('discovery1', brand, () => {}));
      } else {
        if (state.chatDiscovery1.messages.length === 0) openChat('discovery1');
        screen.appendChild(renderChat('discovery1', brand, () => {}));
      }
      screen.appendChild(renderPdp(brand,
        () => {
          // Close PDP → return to whatever spawned it (chat-half / chat-full / listing)
          state.discovery1 = state.discovery1ReturnTo || 'chat-full';
          render();
        },
        () => {
          // Tapping a PDP chip → land in full chat
          state.discovery1 = 'chat-full';
          render();
        }
      ));
    }
  }

  // Toast (shows briefly when "Add to cart" clicked)
  const chat = getChat(flowKey);
  if (chat.toast && chat.toast.message) {
    screen.appendChild(el('div', { class: 'toast' }, chat.toast.message));
  }

  phone.appendChild(screen);
  return phone;
}

/* ── Stage ── */
function renderStage() {
  // Cancel any pending debounced render (we're rendering now)
  if (_stageRenderTimer) { clearTimeout(_stageRenderTimer); _stageRenderTimer = null; }

  const stage = document.getElementById('stage');

  // Capture scroll positions of any scrollable inner views so they survive
  // the rebuild. Without this, the IG feed / PDP / chat / listing all reset
  // to scrollTop=0 on every keystroke and the screen visibly bounces.
  const SCROLL_SELECTORS = ['.ig-feed', '.pdp-body', '.chat-body', '.listing-body'];
  const savedScrolls = SCROLL_SELECTORS.map(sel => {
    const node = stage.querySelector(sel);
    return node ? node.scrollTop : 0;
  });
  // Lock the stage's height during the swap so the page doesn't reflow shorter
  // for a frame and pull the rest of the doc upward.
  const lockedHeight = stage.getBoundingClientRect().height;
  if (lockedHeight) stage.style.minHeight = lockedHeight + 'px';

  stage.innerHTML = '';

  const col = el('div', { class: 'flow-col' });

  // Top-level flow toggle.
  // Brands with `hasDiscovery1` get the 4-flow toggle. Default labels are
  // BBH's 0/1/2/3; any brand can override with `flowLabels` (e.g. Kollo
  // uses OG / PDP / Halfsheet / Direct to chat).
  const toggle = el('div', { class: 'flow-toggle' });
  const _brand = getBrand();
  const labels = _brand.flowLabels || {};
  // Kollo-only build: OG flow (flow0) is intentionally omitted; the toggle
  // shows just PDP / Halfsheet / Direct to chat.
  const flowOptions = _brand.hasDiscovery1
    ? [
        ['flowA',      labels.flowA      || '1'],
        ['discovery1', labels.discovery1 || '2'],
        ['flowC1',     labels.flowC1     || '3'],
      ]
    : [
        ['flowA',  labels.flowA  || 'Flow A'],
        ['flowC1', labels.flowC1 || 'Flow C1'],
      ];
  // Safety: if active flow disappears for this brand, fall back to the first
  if (!flowOptions.find(([k]) => k === state.activeFlow)) state.activeFlow = flowOptions[0][0];
  flowOptions.forEach(([key, label]) => {
    const b = el('button', { class: state.activeFlow === key ? 'active' : '' }, label);
    b.addEventListener('click', () => {
      state.activeFlow = key;
      render();
    });
    toggle.appendChild(b);
  });
  col.appendChild(toggle);
  col.appendChild(renderPhone(state.activeFlow));
  stage.appendChild(col);

  // Restore scroll positions and release the height lock on the next frame.
  requestAnimationFrame(() => {
    SCROLL_SELECTORS.forEach((sel, i) => {
      const node = stage.querySelector(sel);
      if (node && savedScrolls[i]) node.scrollTop = savedScrolls[i];
    });
    stage.style.minHeight = '';
  });
}

/* ── Brand Selector ── */
function renderBrandSelector() {
  const brand = getBrand();
  document.getElementById('brandTriggerName').textContent = brand.name;
  document.getElementById('brandTriggerMeta').textContent =
    (brand.category === 'prospective' ? 'Prospective' : 'Current') + ' · ' + brand.industry;
  document.getElementById('brandTriggerAvatar').setAttribute('style',
    `background-image:url(${JSON.stringify(brand.avatar)}); background-color:${brand.brandHex}`);

  const menu = document.getElementById('brandMenu');
  menu.style.display = state.brandMenuOpen ? 'block' : 'none';
  menu.innerHTML = '';
  if (!state.brandMenuOpen) return;

  const renderGroup = (category, label) => {
    const list = BRANDS.filter(b => b.category === category);
    if (!list.length) return;
    menu.appendChild(el('div', { class: 'brand-select-section' }, label));
    const industries = [...new Set(list.map(b => b.industry))];
    industries.forEach(ind => {
      menu.appendChild(el('div', { class: 'brand-select-industry' }, ind));
      list.filter(b => b.industry === ind).forEach(b => {
        const opt = el('div', {
          class: 'brand-option' + (b.id === state.selectedBrandId ? ' selected' : ''),
          onclick: () => selectBrand(b.id),
        },
          el('div', { class: 'brand-option-avatar', style: `background-image: url(${JSON.stringify(b.avatar)}); background-color: ${b.brandHex}` }),
          el('div', { style: 'flex:1' },
            el('div', { class: 'brand-option-name' }, b.name),
            el('div', { class: 'brand-option-domain' }, b.domain),
          ),
        );
        menu.appendChild(opt);
      });
    });
  };
  renderGroup('prospective', 'Prospective (Leads)');
  renderGroup('current', 'Current Customers');
}

/* ── Edit Panel ── */
function renderEditPanel() {
  const brand = getBrand();
  const panel = document.getElementById('editPanel');
  const overlay = document.getElementById('editOverlay');
  panel.classList.toggle('open', state.editOpen);
  overlay.classList.toggle('open', state.editOpen);

  document.getElementById('editPanelTitle').textContent = 'Edit · ' + brand.name;
  document.getElementById('editPanelSub').textContent =
    (brand.category === 'prospective' ? 'Prospective' : 'Current') + ' · ' + brand.industry +
    (state.overrides[brand.id] ? '   · edited' : '');

  document.querySelectorAll('.edit-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === state.editTab);
  });

  const body = document.getElementById('editBody');
  // Preserve scroll position across re-renders (for add/remove of chips/turns)
  const savedScroll = body.scrollTop;
  body.innerHTML = '';

  if (state.editTab === 'notes') {
    body.appendChild(el('div', { class: 'edit-section' },
      el('h4', {}, 'Notes for ' + brand.name),
      (() => {
        const t = el('textarea', {
          class: 'edit-textarea',
          style: 'min-height:300px',
          placeholder: 'Notes for this brand — talking points, what they cared about, what to demo first…',
          oninput: (e) => setOverride('notes', e.target.value),
        });
        t.value = brand.notes || '';
        return t;
      })(),
    ));
    return;
  }

  const section = (title, ...fields) => {
    const sec = el('div', { class: 'edit-section' }, el('h4', {}, title));
    fields.forEach(f => sec.appendChild(f));
    return sec;
  };
  const inputField = (label, path, value, multiline = false) => {
    const f = el('div', { class: 'edit-field' }, el('label', {}, label));
    if (multiline) {
      const t = el('textarea', { class: 'edit-textarea', oninput: (e) => setOverride(path, e.target.value) });
      t.value = value || '';
      f.appendChild(t);
    } else {
      const i = el('input', { class: 'edit-input', type: 'text', oninput: (e) => setOverride(path, e.target.value) });
      i.value = value || '';
      f.appendChild(i);
    }
    return f;
  };
  const chipsField = (label, path, items) => {
    const f = el('div', { class: 'edit-field' }, el('label', {}, label));
    const list = el('div', { class: 'edit-chip-list' });
    items.forEach((item, idx) => {
      const ci = el('div', { class: 'edit-chip-item' });
      const inp = el('input', { type: 'text', oninput: (e) => {
        const next = [...items]; next[idx] = e.target.value;
        setOverride(path, next);
      }});
      inp.value = item;
      const del = el('button', { onclick: () => {
        const next = items.filter((_, i) => i !== idx);
        setOverride(path, next);
        renderEditPanel();
      }}, '×');
      ci.appendChild(inp); ci.appendChild(del);
      list.appendChild(ci);
    });
    list.appendChild(el('button', { class: 'edit-add-chip', onclick: () => {
      setOverride(path, [...items, 'New option']);
      renderEditPanel();
    }}, '+ Add'));
    f.appendChild(list);
    return f;
  };

  // Per-flow turns editor
  const turnsEditor = (flowKey) => {
    const flow = brand[flowKey];
    const turns = flow.turns || [];
    const wrap = document.createElement('div');
    turns.forEach((turn, ti) => {
      const heading = el('h5', {}, `Turn ${ti + 1}`);
      wrap.appendChild(heading);

      const promptField = inputField('Prompt', `${flowKey}.turns.${ti}.prompt`, turn.prompt, true);
      wrap.appendChild(promptField);

      // Options (label + ack pairs)
      const optsLabel = el('label', {}, 'Options (label / acknowledgement)');
      wrap.appendChild(optsLabel);
      turn.options.forEach((opt, oi) => {
        const row = el('div', { class: 'edit-option-row' });
        const lab = el('input', { class: 'edit-input opt-label', type: 'text', placeholder: 'Label' });
        lab.value = opt.label;
        lab.addEventListener('input', (e) => {
          const next = JSON.parse(JSON.stringify(turns));
          next[ti].options[oi].label = e.target.value;
          setOverride(`${flowKey}.turns`, next);
        });
        const ack = el('input', { class: 'edit-input', type: 'text', placeholder: 'Ack reply' });
        ack.value = opt.ack || '';
        ack.addEventListener('input', (e) => {
          const next = JSON.parse(JSON.stringify(turns));
          next[ti].options[oi].ack = e.target.value;
          setOverride(`${flowKey}.turns`, next);
        });
        const rm = el('button', { class: 'opt-remove', onclick: () => {
          const next = JSON.parse(JSON.stringify(turns));
          next[ti].options.splice(oi, 1);
          setOverride(`${flowKey}.turns`, next);
          renderEditPanel();
        }}, '×');
        row.appendChild(lab); row.appendChild(ack); row.appendChild(rm);
        wrap.appendChild(row);
      });
      const addOpt = el('button', { class: 'edit-add-chip', onclick: () => {
        const next = JSON.parse(JSON.stringify(turns));
        next[ti].options.push({ label: 'New option', ack: '' });
        setOverride(`${flowKey}.turns`, next);
        renderEditPanel();
      }}, '+ Add option');
      wrap.appendChild(addOpt);

      // Remove turn
      const removeTurn = el('button', { class: 'edit-add-chip', style: 'margin-left:6px; color:#aaa', onclick: () => {
        if (!confirm('Remove this turn?')) return;
        const next = turns.filter((_, i) => i !== ti);
        setOverride(`${flowKey}.turns`, next);
        renderEditPanel();
      }}, '× Remove turn');
      wrap.appendChild(removeTurn);
    });

    const addTurn = el('button', { class: 'edit-add-chip', style: 'margin-top:8px', onclick: () => {
      const next = [...turns, { prompt: 'New question?', options: [{ label: 'Option A', ack: '' }] }];
      setOverride(`${flowKey}.turns`, next);
      renderEditPanel();
    }}, '+ Add turn');
    wrap.appendChild(addTurn);

    return wrap;
  };

  // Helper: section with an emoji icon for quick scanning
  const iconSection = (icon, title, ...fields) => {
    const sec = el('div', { class: 'edit-section' },
      el('h4', {},
        el('span', { class: 'icon' }, icon),
        el('span', {}, title),
      ),
    );
    fields.forEach(f => sec.appendChild(f));
    return sec;
  };

  // Helper: per-flow section with colored badge + subtitle for distinctness
  const flowSection = (badge, subtitle) => {
    const sec = el('div', { class: 'edit-section flow-section' });
    sec.appendChild(el('h4', {},
      el('span', { class: 'flow-badge' }, badge),
      el('span', {}, subtitle),
    ));
    return sec;
  };

  const isBbh = !!brand.hasDiscovery1;

  // ── Shared sections (apply to all flows) ──────────────────────────
  body.appendChild(iconSection('📢', 'Ad creative',
    inputField('CTA button label', 'ctaLabel', brand.ctaLabel),
  ));

  body.appendChild(iconSection('🛍️', 'Product (PDP)',
    inputField('Product name (use \\n for line break)', 'product.name', brand.product.name, true),
    inputField('Description', 'product.description', brand.product.description, true),
    chipsField('Feature bullets', 'product.features', brand.product.features || []),
  ));

  body.appendChild(iconSection('⭐', 'Recommendation card (end of chat)',
    inputField('Title', 'recommendation.title', brand.recommendation.title, true),
    inputField('Subtitle', 'recommendation.sub', brand.recommendation.sub),
    inputField('Blurb', 'recommendation.blurb', brand.recommendation.blurb, true),
  ));

  // ── Per-flow sections ─────────────────────────────────────────────
  // Labels and order depend on the brand: BBH has 4 numbered flows; everyone
  // else has the original Flow A / Flow C1.

  if (isBbh) {
    // Flow 0 — Real product page (link out)
    const s0 = flowSection('Flow 0', 'Real product page (link out, no chat)');
    s0.appendChild(el('p', { class: 'flow-section-sub' }, 'Tapping the ad CTA loads this URL inside the in-app browser.'));
    s0.appendChild(inputField('Product page URL', 'productPageUrl', brand.productPageUrl));
    s0.appendChild(inputField('Screenshot filename (in project root)', 'screenshotImage', brand.screenshotImage));
    body.appendChild(s0);
  }

  // Flow 1 (BBH) / Flow A (everyone else) — Ad → PDP → Chat
  const sA = flowSection(isBbh ? 'Flow 1' : 'Flow A', 'Ad → PDP → Chat');
  sA.appendChild(el('p', { class: 'flow-section-sub' }, 'PDP slides up over a product listing. Chips on the PDP launch the chat with that question pre-filled.'));
  sA.appendChild(inputField('PDP input placeholder', 'flowA.pdpInputPlaceholder', brand.flowA.pdpInputPlaceholder));
  sA.appendChild(chipsField('PDP suggestion chips', 'flowA.pdpChips', brand.flowA.pdpChips || []));
  sA.appendChild(inputField('Chip user clicks (preview)', 'flowA.starterChip', brand.flowA.starterChip));
  sA.appendChild(inputField('AI welcome message', 'flowA.welcome', brand.flowA.welcome, true));
  sA.appendChild(turnsEditor('flowA'));
  body.appendChild(sA);

  // Flow 2 — Discovery 1.0 (BBH only)
  if (isBbh && brand.discovery1) {
    const s2 = flowSection('Flow 2', 'Discovery 1.0 · Half-sheet → Full chat');
    s2.appendChild(el('p', { class: 'flow-section-sub' }, 'Half-sheet over the ad on CTA tap; expands to full chat on any interaction.'));
    s2.appendChild(inputField('Product card label', 'discovery1.productLabel', brand.discovery1.productLabel));
    s2.appendChild(inputField('AI welcome message', 'discovery1.welcome', brand.discovery1.welcome, true));
    s2.appendChild(turnsEditor('discovery1'));
    body.appendChild(s2);
  }

  // Flow 3 (BBH) / Flow C1 (everyone else) — Direct to chat
  const sC = flowSection(isBbh ? 'Flow 3' : 'Flow C1', 'Ad → Chat directly');
  sC.appendChild(el('p', { class: 'flow-section-sub' }, 'Ad CTA opens the chat full-screen, no PDP step.'));
  sC.appendChild(inputField('Product card label', 'flowC1.productLabel', brand.flowC1.productLabel));
  sC.appendChild(inputField('AI welcome message', 'flowC1.welcome', brand.flowC1.welcome, true));
  sC.appendChild(turnsEditor('flowC1'));
  body.appendChild(sC);

  // Restore scroll so add/remove of chips/turns doesn't jump back to top
  body.scrollTop = savedScroll;
}

function render() {
  // Kollo-only build: brand selector + edit panel are removed from the DOM,
  // so we only render the stage.
  renderStage();
}

render();
</script>
</body>
</html>
